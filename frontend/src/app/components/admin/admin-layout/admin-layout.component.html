<div class="admin-shell" [class.collapsed]="sidebarCollapsed">

    <!-- ════ SIDEBAR ════ -->
    <aside class="sidebar">
        <!-- Brand -->
        <div class="sidebar-brand">
            <span class="brand-icon">🔨</span>
            <span class="brand-name">Elite Auction</span>
            <button class="collapse-btn" (click)="toggleSidebar()" title="Collapse">
                {{ sidebarCollapsed ? '→' : '←' }}
            </button>
        </div>

        <!-- Admin info -->
        <div class="admin-info">
            <div class="admin-avatar">{{ currentUser?.name?.charAt(0)?.toUpperCase() || 'A' }}</div>
            <div class="admin-meta">
                <div class="admin-name">{{ currentUser?.name || 'Admin' }}</div>
                <div class="admin-role">Administrator</div>
            </div>
        </div>

        <div class="sidebar-divider"></div>

        <!-- Nav Items -->
        <nav class="sidebar-nav">
            <a *ngFor="let item of navItems" [routerLink]="item.route" routerLinkActive="active" class="nav-item">
                <span class="nav-icon">{{ item.icon }}</span>
                <span class="nav-label">{{ item.label }}</span>
            </a>
        </nav>

        <div class="sidebar-bottom">
            <div class="sidebar-divider"></div>
            <button class="nav-item logout-btn" (click)="logout()">
                <span class="nav-icon">🚪</span>
                <span class="nav-label">Logout</span>
            </button>
        </div>
    </aside>

    <!-- ════ MAIN CONTENT ════ -->
    <div class="admin-content">
        <!-- Top bar -->
        <header class="top-bar">
            <button class="hamburger" (click)="toggleSidebar()">☰</button>
            <div class="top-bar-right">
                <span class="top-greeting">Welcome, {{ currentUser?.name || 'Admin' }}</span>
                <span class="top-badge">Admin</span>
            </div>
        </header>

        <!-- Page content -->
        <main class="page-body">
            <router-outlet></router-outlet>
        </main>
    </div>

</div>
