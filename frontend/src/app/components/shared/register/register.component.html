<div class="register-container">
  <div class="register-card card">
    <div class="card-header">
      <h2 class="card-title text-center">Register for Auction System</h2>
    </div>
    
    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
      <div class="alert alert-success" *ngIf="success">
        Registration successful! Redirecting to login...
      </div>

      <div class="alert alert-danger" *ngIf="error">
        {{ error }}
      </div>

      <div class="form-group">
        <label for="role">Register As</label>
        <select id="role" class="form-control" formControlName="role">
          <option value="supplier">Supplier</option>
          <option value="customer">Customer</option>
        </select>
      </div>

      <div class="form-group">
        <label for="name">Full Name</label>
        <input 
          type="text" 
          id="name"
          class="form-control" 
          formControlName="name"
          [class.is-invalid]="f['name'].invalid && f['name'].touched"
        />
        <div class="invalid-feedback" *ngIf="f['name'].invalid && f['name'].touched">
          Name is required
        </div>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input 
          type="email" 
          id="email"
          class="form-control" 
          formControlName="email"
          [class.is-invalid]="f['email'].invalid && f['email'].touched"
        />
        <div class="invalid-feedback" *ngIf="f['email'].invalid && f['email'].touched">
          <div *ngIf="f['email'].errors?.['required']">Email is required</div>
          <div *ngIf="f['email'].errors?.['email']">Email must be valid</div>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input 
          type="password" 
          id="password"
          class="form-control" 
          formControlName="password"
          [class.is-invalid]="f['password'].invalid && f['password'].touched"
        />
        <div class="invalid-feedback" *ngIf="f['password'].invalid && f['password'].touched">
          <div *ngIf="f['password'].errors?.['required']">Password is required</div>
          <div *ngIf="f['password'].errors?.['minlength']">Password must be at least 6 characters</div>
        </div>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input 
          type="password" 
          id="confirmPassword"
          class="form-control" 
          formControlName="confirmPassword"
          [class.is-invalid]="(f['confirmPassword'].invalid || registerForm.errors?.['mismatch']) && f['confirmPassword'].touched"
        />
        <div class="invalid-feedback" *ngIf="f['confirmPassword'].touched">
          <div *ngIf="f['confirmPassword'].errors?.['required']">Confirm password is required</div>
          <div *ngIf="registerForm.errors?.['mismatch']">Passwords do not match</div>
        </div>
      </div>

      <div class="form-group">
        <label for="phone">Phone (Optional)</label>
        <input 
          type="tel" 
          id="phone"
          class="form-control" 
          formControlName="phone"
        />
      </div>

      <div class="form-group">
        <label for="address">Address (Optional)</label>
        <textarea 
          id="address"
          class="form-control" 
          formControlName="address"
          rows="3"
        ></textarea>
      </div>

      <button type="submit" class="btn btn-primary btn-block" [disabled]="loading">
        <span *ngIf="loading" class="spinner"></span>
        <span *ngIf="!loading">Register</span>
      </button>

      <div class="text-center mt-20">
        <p>Already have an account? <a routerLink="/login">Login here</a></p>
      </div>
    </form>
  </div>
</div>
